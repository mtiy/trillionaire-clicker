<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trillionaire Clicker</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/main.js" defer></script>
</head>
<body>
    <div class="options-banner">
        <div>
            <button id="darkMode">Dark Mode</button>
            <button id="devMode">Dev Mode</button>
        </div>
    </div>
    <div class="horizontal-wrapper">
        <div class="click-upgrade-container"></div>
        <div class="money-container">
            <div class="money-display"></div>
            <div class="money-button-container">
                <button class="money-button">Spend</button>
            </div>
            <div class="message-log"></div>
        </div>
        <div class="people-container"></div>
        <div class="game-over-box" hidden>
            <div class="game-over-text">
                Congratulations! You did it! You can play again, with a couple different options. Or you can
                just go tell all your friends about how you won Trillionaire Clicker. Good work!
            </div>
            <div class="button-container">
                <button class="end-game-button" id="playAgain">Play Again</button>
                <button class="end-game-button" id="playAgainEasy">Play Again with Everything Unlocked</button>
                <button class="end-game-button" id="playAgainHard">Play Again on Hard Mode</button>
            </div>
        </div>
    </div>

</body>
</html>
